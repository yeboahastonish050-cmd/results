<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <div class="main">
      <div class="container1">
        <p>Your Result</p>
        <div class="ring">
          <h1>76</h1>
          <p>of 100</p>
        </div>
        <h3>Great</h3>
        <p>
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>
      <div></div>
      <div class="container3">
        <h3>Summary</h3>
        <div class="container2">
          <div id="react">
            <p class="inputoff1">
              <img
                src="icon-reaction.svg"
                alt="icon-reaction"
              />Reaction
            </p>
            <p class="outoff">80/<span class="red">100</span></p>
          </div>
          <div id="memo">
            <img src="icon-memory.svg" alt="icon-memory" />
            <p class="inputoff2">Memory</p>
            <p class="outoff">92/<span class="red">100</span></p>
          </div>
          <div id="verb">
            <img src="icon-verbal.svg" alt="icon-verbal" />
            <p class="inputoff3">Verbal</p>
            <p class="outoff1">61/<span class="red">100</span></p>
          </div>
          <div id="visa">
            <img src="icon-visual.svg" alt="icon-visual" />
            <p class="inputoff4">Visual</p>
            <p class="outoff1">72/<span class="red">100</span></p>
          </div>
          <button>Continue</button>
        </div>
      </div>
    </div>
  </body>
</html>
